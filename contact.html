<!DOCTYPE html>
<html>
<head>
    <title>Contact - Maharashtra Tourism</title>
    <link rel="stylesheet" href="contact.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">MahaTour</h2>
    <a href="index.html">Home</a>
</nav>

<!-- HERO -->
<header class="hero">
    <h1>Contact Us</h1>
    <p>We’d love to help you plan your journey</p>
</header>

<!-- MAIN -->
<div class="container">

    <!-- PROFILE CARD -->
    <div class="card profile">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Person">
        <h2>Travel Support</h2>
        <p>Helping you explore Maharashtra better</p>

        <p><strong>Email:</strong> travel@maharashtra.com</p>
        <p><strong>Phone:</strong> +91 9876543210</p>
    </div>

    <!-- CONTACT FORM -->
    <div class="card form">
        <h2>Send Message</h2>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>

        <button>Send Message</button>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Maharashtra Tourism</p>
</footer>

</body>
</html>
